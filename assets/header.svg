<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" width="1400" height="520" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Abdulrahman Mohammed, senior React Native and Expo developer based in Cairo">
  <defs>
    <style>
      .display {
        font-family: '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'system-ui', 'Helvetica Neue', sans-serif;
        font-weight: 900;
        letter-spacing: -0.045em;
      }
      .mono {
        font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
        font-weight: 500;
        letter-spacing: 0.18em;
      }
      .mark {
        font-family: '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'system-ui', sans-serif;
        font-weight: 900;
        letter-spacing: -0.06em;
      }
      .arabic {
        font-family: 'Diwan Kufi', 'Al Bayan', 'DecoType Naskh', 'Sakkal Majalla', 'SF Arabic', 'Geeza Pro', 'Tahoma', sans-serif;
        font-weight: 500;
      }
      .dot { animation: pulse 2.4s cubic-bezier(0.16, 1, 0.3, 1) infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.32; }
      }
      .bar { animation: barshift 5s cubic-bezier(0.16, 1, 0.3, 1) infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes barshift {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(0.5); }
      }
      .bar2 { animation: barshift 5s cubic-bezier(0.16, 1, 0.3, 1) infinite; animation-delay: -1.2s; transform-origin: center; transform-box: fill-box; }
      .bar3 { animation: barshift 5s cubic-bezier(0.16, 1, 0.3, 1) infinite; animation-delay: -2.4s; transform-origin: center; transform-box: fill-box; }
      .bar4 { animation: barshift 5s cubic-bezier(0.16, 1, 0.3, 1) infinite; animation-delay: -3.6s; transform-origin: center; transform-box: fill-box; }
      .markdrift { animation: markdrift 7s cubic-bezier(0.16, 1, 0.3, 1) infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes markdrift {
        0%, 100% { opacity: 0.96; }
        50% { opacity: 0.78; }
      }
    </style>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1a1410" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="520" fill="#0f0a07"/>
  <rect width="1080" height="520" fill="url(#grid)" opacity="0.6"/>

  <rect x="1080" y="0" width="320" height="520" fill="#c66a3e"/>

  <text x="60" y="64" class="mono" font-size="11" fill="#9a8f82">SENIOR / MOBILE</text>
  <line x1="60" y1="76" x2="116" y2="76" stroke="#c66a3e" stroke-width="2"/>

  <text x="1040" y="64" class="mono" font-size="11" fill="#7a6f62" text-anchor="end">CAIRO · GMT+2</text>

  <text x="60" y="230" class="display" font-size="118" fill="#f8f5ee">ABDULRAHMAN<tspan fill="#c66a3e">.</tspan></text>
  <text x="60" y="338" class="display" font-size="118" fill="none" stroke="#3a2e23" stroke-width="1.5">MOHAMMED</text>

  <line x1="60" y1="394" x2="1020" y2="394" stroke="#2a2218" stroke-width="1"/>

  <text x="60" y="432" font-size="20" fill="#d8cfc4" font-style="italic" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-weight="400">five years shipping production mobile apps</text>

  <rect x="60" y="466" width="48" height="6" fill="#c66a3e"/>
  <text x="124" y="473" class="mono" font-size="12" fill="#d8cfc4">REACT NATIVE  ·  EXPO  ·  TYPESCRIPT</text>

  <circle cx="860" cy="470" r="4" fill="#7fb968" class="dot"/>
  <text x="1040" y="475" class="mono" font-size="11" fill="#9a8f82" text-anchor="end">OPEN FOR CONTRACT</text>

  <text x="1340" y="64" class="mono" font-size="10" fill="#0f0a07" text-anchor="end" opacity="0.55">ABDULRAHMAN—MOBILEDEV</text>

  <text x="1240" y="270" class="mark markdrift" font-size="172" fill="#0f0a07" text-anchor="middle">A·M</text>

  <text x="1240" y="338" class="arabic" font-size="34" fill="#0f0a07" text-anchor="middle" opacity="0.82" direction="rtl">عبد الرحمن محمد</text>

  <rect x="1130" y="392" width="14" height="60" fill="#0f0a07" class="bar"/>
  <rect x="1156" y="392" width="14" height="60" fill="#0f0a07" class="bar2"/>
  <rect x="1182" y="392" width="14" height="60" fill="#0f0a07" class="bar3"/>
  <rect x="1208" y="392" width="14" height="60" fill="#0f0a07" class="bar4"/>
  <rect x="1234" y="392" width="14" height="60" fill="#0f0a07" class="bar"/>
  <rect x="1260" y="392" width="14" height="60" fill="#0f0a07" class="bar2"/>
  <rect x="1286" y="392" width="14" height="60" fill="#0f0a07" class="bar3"/>
  <rect x="1312" y="392" width="14" height="60" fill="#0f0a07" class="bar4"/>
  <rect x="1338" y="392" width="14" height="60" fill="#0f0a07" class="bar"/>

  <text x="1100" y="488" class="mono" font-size="10" fill="#0f0a07" opacity="0.55">CAIRO · EGYPT</text>
</svg>
