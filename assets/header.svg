<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Abdulrahman Mohammed — Senior React Native and Expo developer">
  <defs>
    <style>
      .serif {
        font-family: 'Iowan Old Style', 'Cormorant Garamond', 'EB Garamond', 'Playfair Display', Garamond, Georgia, serif;
        font-weight: 500;
        letter-spacing: -0.025em;
      }
      .italic {
        font-family: 'Iowan Old Style', 'Cormorant Garamond', 'EB Garamond', 'Playfair Display', Garamond, Georgia, serif;
        font-style: italic;
        font-weight: 400;
        letter-spacing: 0;
      }
      .mono {
        font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
        font-weight: 400;
        letter-spacing: 0.18em;
      }
    </style>
  </defs>

  <rect width="1280" height="360" fill="#0d1117"/>

  <!-- subtle grid hairlines, very faint -->
  <line x1="88" y1="40" x2="88" y2="320" stroke="#1c2128" stroke-width="1"/>
  <line x1="1192" y1="40" x2="1192" y2="320" stroke="#1c2128" stroke-width="1"/>

  <!-- top-left eyebrow -->
  <text x="104" y="68" class="mono" font-size="11" fill="#8b949e">SENIOR · REACT NATIVE · EXPO</text>
  <line x1="104" y1="80" x2="140" y2="80" stroke="#e8a87c" stroke-width="1.5"/>

  <!-- top-right locator -->
  <text x="1176" y="68" class="mono" font-size="11" fill="#6e7681" text-anchor="end">CAIRO · GMT+2</text>

  <!-- the name -->
  <text x="100" y="222" class="serif" font-size="96" fill="#f0f6fc">Abdulrahman<tspan fill="#e8a87c" dx="-4">.</tspan></text>

  <!-- italic tagline -->
  <text x="104" y="262" class="italic" font-size="24" fill="#c9d1d9">five years shipping production mobile apps</text>

  <!-- bottom-left mono stack -->
  <text x="104" y="312" class="mono" font-size="11" fill="#8b949e">REACT NATIVE · EXPO · TYPESCRIPT · AVAILABLE FOR CONTRACT</text>

  <!-- right vertical accent -->
  <rect x="1188" y="188" width="3" height="84" fill="#e8a87c"/>
</svg>
