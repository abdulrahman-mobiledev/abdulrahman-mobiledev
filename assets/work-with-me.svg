<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" width="1400" height="360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Work with me — Email, Upwork, LinkedIn">
  <defs>
